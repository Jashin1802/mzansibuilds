{% extends "base.html" %}
{% block title %}Edit Profile — MzansiBuilds{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-page-header">
    <h1 class="form-page-title">Edit Profile</h1>
    <p class="form-page-sub">Update your public developer profile</p>
  </div>

  {% if error %}
    <div class="auth-error" style="margin-bottom:16px;">{{ error }}</div>
  {% endif %}

  <form method="POST" class="project-form">
    <div class="form-group">
      <label class="label" for="name">Full Name *</label>
      <input class="input" type="text" id="name" name="name" value="{{ current_user.name }}" required autofocus />
    </div>
    <div class="form-group">
      <label class="label" for="bio">Bio</label>
      <textarea class="input textarea" id="bio" name="bio" style="min-height:80px;">{{ current_user.bio }}</textarea>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('profile.profile') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Changes →</button>
    </div>
  </form>
</div>
{% endblock %}
